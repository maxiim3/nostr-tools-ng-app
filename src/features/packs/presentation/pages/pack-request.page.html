<section class="relative flex min-h-[calc(100vh-4rem)] pt-48 justify-center overflow-hidden px-6">
  <div aria-hidden="true" class="absolute -left-32 -top-32 h-96 w-96 rounded-full bg-primary/10 blur-3xl"></div>
  <div aria-hidden="true" class="absolute -bottom-24 -right-24 h-80 w-80 rounded-full bg-secondary/10 blur-3xl"></div>

  <div class="relative z-10 max-w-xl space-y-4 text-center">
    <h1 class="text-4xl font-black tracking-tight text-base-content md:text-5xl">
      {{ 'request.title' | transloco }}
    </h1>
    <p class="text-lg leading-relaxed text-base-content/60">
      {{ 'request.subtitle' | transloco }}
    </p>

    @if (loading()) {
      <div class="flex justify-center">
        <span class="loading loading-spinner loading-lg"></span>
      </div>
    } @else {
      @if (!isAuthenticated()) {
        <div class="space-y-4">
          <button class="btn btn-primary btn-lg mx-auto" (click)="connect()">
            {{ 'request.connect' | transloco }}
          </button>
        </div>
      } @else {
        @if (requestStatus() === 'idle') {
          <div class="space-y-4">
            <button class="btn btn-primary btn-lg mx-auto" (click)="submitRequest()">
              {{ 'request.requestJoin' | transloco }}
            </button>
          </div>
        } @else {
          <div class="badge {{ statusPillClass() }} badge-lg mx-auto">
            {{ 'request.status.' + requestStatus() | transloco }}
          </div>
        }
      }
    }
  </div>
</section>
