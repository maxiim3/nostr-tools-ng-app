<main
  class="relative flex min-h-[calc(100vh-4rem)] flex-col items-center justify-center overflow-hidden px-6"
>
  <div
    aria-hidden="true"
    class="absolute left-[50%] -top-32 size-128 rounded-full bg-orange-500/10 blur-3xl"
  ></div>
  <div
    aria-hidden="true"
    class="absolute -bottom-32 right-[50%] size-96 rounded-full bg-teal-500/10 blur-3xl"
  ></div>

  <div class="relative z-10 max-w-2xl space-y-8 text-center">
    <h1 class="text-5xl font-black tracking-tight text-base-content md:text-6xl">
      {{ 'home.title' | transloco }}
    </h1>

    <p class="text-lg leading-relaxed text-base-content/70">{{ 'home.description' | transloco }}</p>

    <a
      routerLink="/packs/francophone/request"
      class="btn btn-primary btn-lg whitespace-pre-line leading-tight px-8 py-4 h-24"
    >
      {{ 'home.cta' | transloco }}
    </a>
  </div>
</main>
