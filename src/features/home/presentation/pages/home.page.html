  <main class="space-y-12 p-6 md:p-12">
    <div class="flex flex-col items-center gap-4 xl:flex-row xl:gap-1 xl:justify-stretch">
      <!-- Item is selected -->
      <!-- left hand side source pack -->
      <app-profile-card [user]="sourceProfile()" [status]="sourceStatus()" />

      <span class="h-1 w-full max-w-96 bg-success xl:w-96"></span>
      <input type="checkbox" checked="checked" class="checkbox checkbox-success" />
      <span class="h-1 w-full max-w-96 bg-success xl:w-96"></span>

      <!-- right hand side targe pack (mine, must be signed and have write/edit access) -->
      <app-profile-card [user]="targetProfile()" [status]="targetStatus()" />
    </div>

    <!-- haven't added the overlay -->
    <div class="flex flex-col items-center gap-4 xl:flex-row xl:gap-1 xl:justify-stretch">
      <!-- loading -->
      <app-profile-card [status]="'skeleton'" />

      <span class="h-1 w-full max-w-96 bg-base-300 xl:w-96"></span>
      <!-- depends on the line status : success | rejected | idl -->
      <input type="checkbox" checked="checked" class="checkbox checkbox-primary" />
      <span class="h-1 w-full max-w-96 bg-base-300 xl:w-96"></span>

      <app-profile-card [user]="sourceProfile()" [status]="transparentStatus()" />
    </div>

  </main>
